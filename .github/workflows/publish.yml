name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for npm Trusted Publishing (OIDC)
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'   # Trusted Publishing requires Node 22.14+ / npm 11.5.1+
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (Trusted Publishing requires npm 11.5.1+)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Publish to npm
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if [[ "$VERSION" =~ -(beta|alpha|rc|next) ]]; then
            # Prerelease versions need an explicit tag
            TAG=$(echo "$VERSION" | sed -E 's/.*-([a-z]+).*/\1/')
            npm publish --access public --tag "$TAG"
          else
            npm publish --access public
          fi
        # --provenance is automatic with Trusted Publishing from GHA
        # No NODE_AUTH_TOKEN needed — OIDC handles auth
